          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.LOWER_OWNER }}/takeout-h5:latest
            ghcr.io/${{ env.LOWER_OWNER }}/takeout-h5:${{ github.sha }}

  merchant-web:
