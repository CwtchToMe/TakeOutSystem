name: Build & Push Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'h5/**'
      - 'admin-web/**'
      - 'merchant-web/**'
      - 'docker/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:          # 支持手动触发

permissions:
  contents: read
  packages: write            # 推送到 GHCR 必须

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 把 GitHub 用户名转为小写（Docker tag 必须小写）
      - name: Set owner lowercase
        run: echo "LOWER_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.LOWER_OWNER }}/takeout-backend:latest
            ghcr.io/${{ env.LOWER_OWNER }}/takeout-backend:${{ github.sha }}

  h5:
