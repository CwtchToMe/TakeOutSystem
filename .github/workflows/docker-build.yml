name: Build & Push Docker Images

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'h5/**'
      - 'admin-web/**'
      - 'merchant-web/**'
      - 'docker/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:          # 支持手动触发
    inputs:
      clean:
        description: 'Clean rebuild — clear cache and build from scratch'
        required: false
        default: false
        type: boolean

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          provenance: false
          sbom: false
          no-cache: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cwtchtome/takeout-backend:latest
            cwtchtome/takeout-backend:${{ github.sha }}

  h5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push H5
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/h5/Dockerfile
          push: true
          provenance: false
          sbom: false
          no-cache: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cwtchtome/takeout-h5:latest
            cwtchtome/takeout-h5:${{ github.sha }}

  merchant-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push merchant-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/merchant-web/Dockerfile
          push: true
          provenance: false
          sbom: false
          no-cache: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cwtchtome/takeout-merchant:latest
            cwtchtome/takeout-merchant:${{ github.sha }}

  admin-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push admin-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/admin-web/Dockerfile
          push: true
          provenance: false
          sbom: false
          no-cache: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clean == 'true' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            cwtchtome/takeout-admin:latest
            cwtchtome/takeout-admin:${{ github.sha }}
